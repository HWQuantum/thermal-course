version: 1

project:
  id: fcd2ee7d-14f1-4464-a380-ad08da06bf9f
  exclude:
    - Lite/**
    - Lite.ipynb

site:
  template: book-theme
  # Define exactly what appears in the sidebar
  nav:
    - title: Labs
      children:
        - file: lab1.md
        - file: lab2.md
        - file: lab3.md
        - file: lab4.md
  options:
    logo: assets/images/logo.png
    favicon: assets/images/logo.png
    base_url: /thermal-course/
  parts:
    footer: |
      © 2026 Thermal Physics Simulations  
      Physics Department — Heriot-Watt University

html:
  use_sanitize: false

exports:
  - format: html
  - format: pdf
    template: typst/myst/lapreprint-typst
    output: _build/site/exports/thermal-course.pdf

actions:
  - title: Lab 1 PDF
    url: /exports/lab1.pdf
    static: true
  - title: Lab 2 PDF
    url: /exports/lab2.pdf
    static: true